{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center w-100 m-0">
    <div class="col-12 col-sm-8 col-md-5 col-lg-3">
        <div class="card shadow-sm border-0" style="border-radius: 12px;">
            <div class="card-body p-3 p-md-4 text-center">
                <div class="text-primary mb-2">
                    <i class="bi bi-person-circle" style="font-size: 2.2rem;"></i>
                </div>
                
                <h6 class="fw-bold text-dark mb-1">Bem-vindo de volta</h6>
                <p class="text-muted mb-3" style="font-size: 0.7rem;">Acesse sua conta de gestor</p>

                <form action="{{ url_for('main.login') }}" method="POST" class="text-start">
                    <div class="mb-2">
                        <label class="form-label mb-0 fw-bold text-secondary" style="font-size: 0.65rem;">Usuário</label>
                        <input type="text" name="username" class="form-control form-control-sm bg-light border-0 shadow-none py-2" style="font-size: 0.8rem;" placeholder="Usuário" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label mb-0 fw-bold text-secondary" style="font-size: 0.65rem;">Senha</label>
                        <input type="password" name="password" class="form-control form-control-sm bg-light border-0 shadow-none py-2" style="font-size: 0.8rem;" placeholder="Senha" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-sm w-100 fw-bold py-2 shadow-sm" style="font-size: 0.8rem;">
                        Entrar no Sistema <i class="bi bi-box-arrow-in-right ms-1"></i>
                    </button>
                </form>

                <div class="mt-3">
                    <a href="{{ url_for('main.register') }}" class="fw-bold text-decoration-none" style="font-size: 0.7rem;">Criar conta gratuita</a>
                </div>
            </div>
        </div>
        
        <p class="text-center mt-3 text-muted mb-0" style="font-size: 0.6rem; opacity: 0.6;">
            <i class="bi bi-shield-lock-fill"></i> Conexão Segura & Criptografada
        </p>
    </div>
</div>
{% endblock %}
