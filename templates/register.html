{% extends "layout.html" %}
{% block title %}Create Account - CM Manager{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center w-100 m-0">
    <div class="col-12 col-sm-8 col-md-5 col-lg-3"> <div class="card shadow-sm border-0" style="border-radius: 12px;">
            <div class="card-body p-3 p-md-4"> <div class="text-center mb-3">
                    <div class="text-success mb-2">
                        <i class="bi bi-person-plus-fill" style="font-size: 2.2rem;"></i>
                    </div>
                    <h6 class="fw-bold text-dark mb-1">Registrar-se</h6>
                    <p class="text-muted mb-0" style="font-size: 0.7rem;">Comece a gerenciar suas obras hoje</p>
                </div>

                <form action="{{ url_for('main.register') }}" method="POST">
                    <div class="mb-2">
                        <label class="form-label mb-0 fw-bold text-secondary" style="font-size: 0.65rem;">Usuário</label>
                        <input type="text" name="username" class="form-control form-control-sm bg-light border-0 shadow-none py-2" style="font-size: 0.8rem;" placeholder="Usuário" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label mb-0 fw-bold text-secondary" style="font-size: 0.65rem;">Senha</label>
                        <input type="password" name="password" class="form-control form-control-sm bg-light border-0 shadow-none py-2" style="font-size: 0.8rem;" placeholder="Senha forte" required>
                    </div>

                    <button type="submit" class="btn btn-success btn-sm w-100 fw-bold py-2 shadow-sm" style="font-size: 0.8rem;">
                        Criar Minha Conta <i class="bi bi-check-lg ms-1"></i>
                    </button>
                </form>

                <div class="text-center mt-3 border-top pt-3">
                    <p class="text-muted mb-1" style="font-size: 0.7rem;">Já possui cadastro?</p>
                    <a href="{{ url_for('main.login') }}" class="fw-bold text-decoration-none text-success" style="font-size: 0.75rem;">Fazer Login</a>
                </div>
            </div>
        </div>
        
        <p class="text-center mt-3 text-muted mb-0" style="font-size: 0.6rem; opacity: 0.6;">
            <i class="bi bi-shield-check"></i> Registro Seguro & Protegido
        </p>
    </div>
</div>
{% endblock %}
