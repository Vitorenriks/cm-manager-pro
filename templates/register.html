{% extends "layout.html" %}

{% block title %}Create Account - CM Manager{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        
        <div class="card content-card">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-center mb-4">
                    <div class="display-6 text-success mb-2">
                        <i class="bi bi-person-plus-fill"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Register</h3>
                    <p class="text-muted small">Comece a gerenciar suas obras hoje</p>
                </div>

                <form action="{{ url_for('main.register') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control bg-light border-start-0 shadow-none" placeholder="Escolha um usuário" required autofocus>
                        </div>
                        <div class="form-text text-muted small" style="font-size: 0.75rem;">Nome de acesso único para o sistema.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control bg-light border-start-0 shadow-none" placeholder="Crie uma senha forte" required>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg shadow-sm fw-bold py-3">
                            Criar Minha Conta <i class="bi bi-check-lg ms-2"></i>
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">Já possui cadastro?</p>
                    <a href="{{ url_for('main.login') }}" class="fw-bold text-decoration-none text-success">Fazer Login</a>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4 text-muted opacity-75">
            <small><i class="bi bi-shield-check"></i> Proteção de Dados Ativada</small>
        </div>
        
    </div>
</div>
{% endblock %}
