{% extends "layout.html" %}
{% block title %}Editar Projeto - CM Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        
        <div class="d-flex align-items-center mb-3 pb-2 border-bottom">
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary btn-sm me-3 py-1 px-2" style="font-size: 0.75rem;">
                <i class="bi bi-x-lg"></i> Cancelar
            </a>
            <h5 class="fw-bold text-dark mb-0 text-truncate">Editar: {{ work.name }}</h5>
        </div>

        <div class="card shadow-sm border-0" style="border-radius: 12px;">
            <div class="card-body p-3 p-md-4">
                <form action="{{ url_for('main.edit_work', id=work.id) }}" method="post">
                    <div class="row g-3">
                        
                        <div class="col-md-6">
                            <label class="form-label mb-1 fw-bold text-secondary" style="font-size: 0.75rem;">Nome da Obra</label>
                            <input type="text" name="name" class="form-control form-control-sm bg-light border-0 shadow-none py-2" value="{{ work.name }}" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label mb-1 fw-bold text-secondary" style="font-size: 0.75rem;">Cliente</label>
                            <input type="text" name="client" class="form-control form-control-sm bg-light border-0 shadow-none py-2" value="{{ work.client }}" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label mb-1 fw-bold text-secondary" style="font-size: 0.75rem;">Data de Início</label>
                            <input type="date" name="start_date" class="form-control form-control-sm bg-light border-0 shadow-none py-2" value="{{ work.start_date }}">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label mb-1 fw-bold text-secondary" style="font-size: 0.75rem;">Status</label>
                            <select name="status" class="form-select form-select-sm bg-light border-0 shadow-none py-2">
                                <option value="Planned" {% if work.status == 'Planned' %}selected{% endif %}>Planejado</option>
                                <option value="In Progress" {% if work.status == 'In Progress' %}selected{% endif %}>Em Andamento</option>
                                <option value="On Hold" {% if work.status == 'On Hold' %}selected{% endif %}>Pausado</option>
                                <option value="Completed" {% if work.status == 'Completed' %}selected{% endif %}>Concluído</option>
                            </select>
                        </div>
                    </div>

                    <hr class="my-4 opacity-10">

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-sm fw-bold py-2 shadow-sm">
                            <i class="bi bi-arrow-repeat me-2"></i> Atualizar Informações
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <p class="text-center mt-3 text-muted" style="font-size: 0.65rem; opacity: 0.6;">
            <i class="bi bi-pencil-square"></i> As alterações serão aplicadas imediatamente ao Dashboard.
        </p>
    </div>
</div>
{% endblock %}
